name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Archive dist
        run: |
          cd dist
          zip -r ../dist.zip .
          tar -czf ../dist.tar.gz .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist.zip
            dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to remote server
        if: success()
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_PORT="${{ secrets.SSH_PORT }}"
          SSH_USERNAME="${{ secrets.SSH_USERNAME }}"
          SSH_HOST="${{ secrets.SSH_HOST }}"
          REMOTE_PATH="${{ secrets.REMOTE_PATH }}"

          # 如果配置了 SSH_PASSWORD 则使用密码，否则使用密钥
          if [ -n "${{ secrets.SSH_PASSWORD }}" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
            export SSHPASS="${{ secrets.SSH_PASSWORD }}"
            rsync -avz --delete \
              -e "sshpass -e ssh -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
              dist/ ${SSH_USERNAME}@${SSH_HOST}:${REMOTE_PATH}/
          else
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
              dist/ ${SSH_USERNAME}@${SSH_HOST}:${REMOTE_PATH}/
          fi
